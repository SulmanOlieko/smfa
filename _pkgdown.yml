url: https://SulmanOlieko.github.io/metafrontieR/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#1a6b4e"
    secondary: "#2d8f65"
    success: "#28a745"
    info: "#17a2b8"
    base_font:
      google: "Inter"
    heading_font:
      google: "Inter"
    code_font:
      google: "JetBrains Mono"
    border-radius: "0.5rem"
    btn-border-radius: "0.375rem"
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <script src="lightswitch.js"></script>
  css: ["pkgdown/extra.css"]

home:
  title: "metafrontieR — Metafrontier Analysis in R"
  description: >
    An R package for implementing deterministic and stochastic metafrontier analyses,
    assessing technical efficiencies, metafrontier technical efficiencies, and
    metatechnology ratios for firms operating under different technologies.
  links:
  - text: Report a bug
    href: https://github.com/SulmanOlieko/metafrontieR/issues
  - text: View on GitHub
    href: https://github.com/SulmanOlieko/metafrontieR

navbar:
  structure:
    left: [intro, articles, reference, news]
    right: [search, lightswitch, github]
  components:
    intro:
      text: "Get Started"
      href: articles/getting-started.html
    articles:
      text: "Articles"
      menu:
      - text: "Getting Started"
        href: articles/getting-started.html
      - text: "---"
      - text: "Group Frontier Models"
      - text: "Standard SFA Metafrontier (sfacross)"
        href: articles/sfacross-metafrontier.html
      - text: "Latent Class SFA Metafrontier (sfalcmcross)"
        href: articles/sfalcmcross-metafrontier.html
      - text: "Sample Selection SFA Metafrontier (sfaselectioncross)"
        href: articles/sfaselectioncross-metafrontier.html
      - text: "---"
      - text: "Outputs & Extraction"
      - text: "Extracting Efficiencies and MTRs"
        href: articles/efficiency-extraction.html
    lightswitch:
      html: |
        <li class="nav-item dropdown">
          <button class="nav-link dropdown-toggle" type="button" id="dropdown-lightswitch" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Toggle theme (light)">
            <span class="fa fa-sun"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdown-lightswitch">
            <li><button class="dropdown-item" data-bs-theme-value="light"><span class="fa fa-sun me-2"></span> Light</button></li>
            <li><button class="dropdown-item" data-bs-theme-value="dark"><span class="fa fa-moon me-2"></span> Dark</button></li>
            <li><button class="dropdown-item" data-bs-theme-value="auto"><span class="fa fa-adjust me-2"></span> Auto</button></li>
          </ul>
        </li>
    github:
      icon: fab fa-github
      href: https://github.com/SulmanOlieko/metafrontieR
      aria-label: GitHub

reference:
- title: "Core Function"
  desc: >
    The main function for fitting all metafrontier models in `metafrontieR`.
  contents:
  - sfametafrontier

- title: "Model Summary"
  desc: >
    Summarise and print fitted metafrontier model objects.
  contents:
  - summary.sfametafrontier

- title: "Efficiency & MTR Extraction"
  desc: >
    Extract firm-level efficiencies and metatechnology ratios from fitted models.
  contents:
  - efficiencies.sfametafrontier

- title: "Parameter Extraction"
  desc: >
    Extract estimated parameters and variance-covariance matrices.
  contents:
  - coef.sfametafrontier
  - vcov.sfametafrontier

- title: "Model Fit Statistics"
  desc: >
    Information criteria and model fit diagnostics.
  contents:
  - logLik.sfametafrontier
  - ic.sfametafrontier
  - nobs.sfametafrontier
  - fitted.sfametafrontier
  - residuals.sfametafrontier

footer:
  structure:
    left: developed_by
    right: built_with
  components:
    developed_by: >
      Developed by [Sulman Olieko Owili](mailto:oliekosulman@gmail.com).
      Licensed under [GPL (≥ 3)](https://www.gnu.org/licenses/gpl-3.0.html).
