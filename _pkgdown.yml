url: https://SulmanOlieko.github.io/smfa/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#1a6b4e"
    secondary: "#2d8f65"
    success: "#28a745"
    info: "#17a2b8"
    base_font:
      google: "Inter"
    heading_font:
      google: "Inter"
    code_font:
      google: "JetBrains Mono"
    border-radius: "0.5rem"
    btn-border-radius: "0.375rem"
  light-switch: true
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
  css: ["pkgdown/extra.css"]

home:
  title: "smfa — Stochastic and Deterministic Metafrontier Analysis"
  description: >
    Implements metafrontier analyses for productivity and performance
    benchmarking across firms operating under different technologies. Contains
    routines for the deterministic metafrontier envelope of O'Donnell et al.
    (2008) via linear and quadratic programming, and the stochastic metafrontier
    of Huang et al. (2014). Also supports latent class stochastic metafrontier
    analysis and sample selection correction stochastic metafrontier models.
    Depends on the 'sfaR' package by Dakpo et al. (2023).
  links:
    - text: Report a bug
      href: https://github.com/SulmanOlieko/smfa/issues
    - text: View on GitHub
      href: https://github.com/SulmanOlieko/smfa

navbar:
  structure:
    left: [intro, articles, reference, news]
    right: [search, lightswitch, github]
  components:
    intro:
      text: "Get Started"
      href: articles/getting-started.html
    articles:
      text: "Articles"
      menu:
        - text: "Getting Started"
          href: articles/getting-started.html
        - text: "---"
        - text: "Group Frontier Models"
        - text: "Standard SFA Metafrontier (sfacross)"
          href: articles/sfacross-metafrontier.html
        - text: "Latent Class SFA Metafrontier (sfalcmcross)"
          href: articles/sfalcmcross-metafrontier.html
        - text: "Sample Selection SFA Metafrontier (sfaselectioncross)"
          href: articles/sfaselectioncross-metafrontier.html
        - text: "---"
        - text: "Outputs & Extraction"
        - text: "Extracting Efficiencies and MTRs"
          href: articles/efficiency-extraction.html
    github:
      icon: fab fa-github
      href: https://github.com/SulmanOlieko/smfa
      aria-label: GitHub

reference:
  - title: "Core Function"
    desc: >
      The main function for fitting all metafrontier models in `smfa`.
    contents:
      - smfa

  - title: "Model Summary"
    desc: >
      Summarise and print fitted metafrontier model objects.
    contents:
      - summary.smfa

  - title: "Efficiency & MTR Extraction"
    desc: >
      Extract firm-level efficiencies and metatechnology ratios from fitted models.
    contents:
      - efficiencies.smfa

  - title: "Parameter Extraction"
    desc: >
      Extract estimated parameters and variance-covariance matrices.
    contents:
      - coef.smfa
      - vcov.smfa

  - title: "Model Fit Statistics"
    desc: >
      Information criteria and model fit diagnostics.
    contents:
      - logLik.smfa
      - ic.smfa
      - nobs.smfa
      - fitted.smfa
      - residuals.smfa

footer:
  structure:
